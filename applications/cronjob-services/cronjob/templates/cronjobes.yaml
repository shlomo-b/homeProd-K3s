# Kubernetes CronJob Helm template with AWS and Azure storage support.
# provider.aws / provider.azure: set enabled and credentials.* (name+key).
{{- range $name, $config := .Values }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $config.cronjob_name }}
  namespace: cronjob
  {{- if and $config.annotations $config.annotations }}
  annotations:
    {{- range $k, $v := $config.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
  labels:
    app: {{ $config.cronjob_name }}
spec:
  schedule: "{{ $config.schedule }}"
  successfulJobsHistoryLimit: 1  # The number of successful Jobs that Kubernetes will retain in history
  failedJobsHistoryLimit: 1      # The number of failed Jobs that Kubernetes will retain in history
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 60 # The Job (and its pods) will be deleted 60 seconds after completion
      template:
        spec:
{{- with $config.podSecurityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{- end }}

          serviceAccountName: {{ $config.cronjob_name }}
          restartPolicy: OnFailure
          containers:
            - name: cronjob
              image: "{{ $config.image.name }}:{{ $config.image.tag }}"
{{- with $config.securityContext }}
              securityContext:
{{ toYaml . | nindent 16 }}
{{- end }}
              env:
{{- range $env := ($config.env | default list) }}
                - name: {{ $env.name }}
                  valueFrom:
                    secretKeyRef:
                      name: {{ $env.secretName }}
                      key: {{ $env.key.name }}
{{- end }}
{{- if and $config.provider.aws $config.provider.aws.enabled $config.provider.aws.credentials }}
                # AWS storage
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.provider.aws.credentials.aws_access_key_id.name }}
                      key: {{ $config.provider.aws.credentials.aws_access_key_id.key }}
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.provider.aws.credentials.aws_secret_access_key.name }}
                      key: {{ $config.provider.aws.credentials.aws_secret_access_key.key }}
                - name: BUCKET_NAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.provider.aws.credentials.bucket_name.name }}
                      key: {{ $config.provider.aws.credentials.bucket_name.key }}
{{- end }}
{{- if and $config.provider.azure $config.provider.azure.enabled $config.provider.azure.credentials }}
                # Azure storage
                - name: AZURE_TENANT_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.provider.azure.credentials.azure_tenant_id.name }}
                      key: {{ $config.provider.azure.credentials.azure_tenant_id.key }}
                - name: AZURE_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.provider.azure.credentials.azure_client_id.name }}
                      key: {{ $config.provider.azure.credentials.azure_client_id.key }}
                - name: AZURE_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.provider.azure.credentials.azure_client_secret.name }}
                      key: {{ $config.provider.azure.credentials.azure_client_secret.key }}
                - name: AZURE_STORAGE_ACCOUNT
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.provider.azure.credentials.azure_storage_account.name }}
                      key: {{ $config.provider.azure.credentials.azure_storage_account.key }}
                - name: AZURE_STORAGE_CONTAINER
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.provider.azure.credentials.azure_storage_container.name }}
                      key: {{ $config.provider.azure.credentials.azure_storage_container.key }}
{{- end }}
{{- $hasCm := and $config.cm $config.cm.enabled $config.cm.data }}
{{- $hasExtraSecret := and $config.secret $config.secret.enabled }}
{{- if or $hasCm $hasExtraSecret }}
              envFrom:
{{- if $hasCm }}
                - configMapRef:
                    name: cronjob-config-{{ $name }}
{{- end }}
{{- if $hasExtraSecret }}
                - secretRef:
                    name: {{ $config.secret.name | default (printf "cronjob-config-%s" $name) }}
{{- end }}
{{- end }}
{{- if and $config.volumeMounts $config.volumeMounts.enabled $config.volumeMounts.pvc }}
              volumeMounts:
                - name: cronjob-pvc-{{ $name }}
                  mountPath: {{ $config.volumeMounts.pvc.mountPath }}
{{- end }}
{{- if and $config.volumeMounts $config.volumeMounts.enabled $config.volumeMounts.pvc }}
          volumes:
            - name: cronjob-pvc-{{ $name }}
              persistentVolumeClaim:
                claimName: cronjob-pvc-{{ $name }}
{{- end }}

---
{{- end }}
