{{- range $name, $config := .Values }}
{{- if and $config.serviceAccount $config.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{- if $config.serviceAccount.name }}
        {{ $config.serviceAccount.name }}
        {{- else }} sa-{{ $config.cronjob_name }}
      {{- end }}
  namespace: {{ include "cronjob.namespace" $config }}
  labels:
    app: {{ $config.cronjob_name }}
{{- with $config.serviceAccount.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
---
{{- end }}
{{- end }}