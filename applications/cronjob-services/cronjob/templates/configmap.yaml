{{- range $name, $config := .Values }}
{{- if and $config.cm $config.cm.enabled $config.cm.data }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-{{ $config.cronjob_name }}
  namespace: {{ include "cronjob.namespace" $config }}
data:
{{- range $k, $v := $config.cm.data }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
---
{{- end }}
{{- end }}
