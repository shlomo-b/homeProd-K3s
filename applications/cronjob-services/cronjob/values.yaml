# Helm values for CronJobs.
# env: list of env from secrets. provider.aws/azure: storage from respective secret.

backup-fortigate:
  cronjob_name: backup-fortigate
  annotations: 
    configmap.reloader.stakater.com/reload: "cronjob-config-backup-fortigate"
    secret.reloader.stakater.com/reload: 
      - "cronjob-credentials-fortigate-backup"
      - "cronjob-credentials-azure"

  serviceAccount:
    create: true
    name: ""
    labels: {}
    annotations: {}


  schedule: "30 0 1 * *" # every month at 00:30
  image:
    name: shlomobarzili/fortigate
    tag: v1.5.0

  env:
    - name: USERNAME
      secretName: cronjob-credentials-fortigate-backup
      key:
        name: USERNAME
    - name: PASSWORD
      secretName: cronjob-credentials-fortigate-backup
      key:
        name: PASSWORD
    - name: HOST
      secretName: cronjob-credentials-fortigate-backup
      key:
        name: HOST
    - name: PORT
      secretName: cronjob-credentials-fortigate-backup
      key:
        name: PORT

  provider:
    aws:
      enabled: false
      credentials:
        aws_access_key_id:
          name: cronjob-credentials-fortigate-backup
          key: AWS_ACCESS_KEY_ID
        aws_secret_access_key:
          name: cronjob-credentials-fortigate-backup
          key: AWS_SECRET_ACCESS_KEY
        bucket_name:
          name: cronjob-credentials-fortigate-backup
          key: BUCKET_NAME
    azure:
      enabled: true
      credentials:
        azure_tenant_id:
          name: cronjob-credentials-azure
          key: AZURE_TENANT_ID
        azure_client_id:
          name: cronjob-credentials-azure
          key: AZURE_CLIENT_ID
        azure_client_secret:
          name: cronjob-credentials-azure
          key: AZURE_CLIENT_SECRET
        azure_storage_account:
          name: cronjob-credentials-azure
          key: AZURE_STORAGE_ACCOUNT
        azure_storage_container:
          name: cronjob-credentials-azure
          key: AZURE_STORAGE_CONTAINER
    gcp:
      enabled: false
      credentials:
        gcp_application_credentials:
          name: cronjob-credentials-gcp
          key: GCP_APPLICATION_CREDENTIALS
        gcp_bucket_name:
          name: cronjob-credentials-gcp
          key: GCP_BUCKET_NAME

  volumeMounts:
    enabled: true
    pvc:
      name: cronjob-pvc-backup-fortigate
      accessModes:
        - ReadWriteOnce
      mountPath: /app
      size: 300Mi

  cm:
    enabled: true
    data:
      PUSHGATEWAY_ADDR: "prometheus-prometheus-pushgateway.monitoring.svc.cluster.local:9091"
      PUSHGATEWAY_JOB: "backup-fortigate"
      PUSHGATEWAY_INSTANCE: "backup-fortigate"
      FW_NAME: "FW-Shlomi #"
      
      # optional push metrics to pushgateway
      metrics-pushgw: "true"

      # optional upload to file backup to aws s3
      # If the value is false, the file will be saved in the container.
      aws: "false"

      # optional upload to file backup to azure storage
      # If the value is false, the file will be saved in the container.
      azure: "true"

      # optional upload to file backup to gcp storage
      # If the value is false, the file will be saved in the container.
      gcp: "false"


  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

