appName: secretpass
namespace: secretpass


server:
  enabled: true
  revisionHistoryLimit: 0
#  replicas: 2
  name: backend
  annotations:
    configmap.reloader.stakater.com/reload: "config-backend"
    secret.reloader.stakater.com/reload: "secretspass-credentials"
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true  

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  service:
    enabled: true
    serviceType: ClusterIP
    port: 5050
  image:
    name: shlomobarzili/secretpass-backend
    pullPolicy: IfNotPresent
    tag: v5.1.0
  containerPort: 5050
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 70
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 50
            periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 50
            periodSeconds: 15
  affinity: {} 
  env:
    # # default is INFO
    # - name: LOG_LEVEL
    #   value: "INFO"

    - name: JWT_SECRET_KEY
      secretName:  secretspass-credentials
      key: JWT_SECRET_KEY
    - name: MONGO_INITDB_ROOT_USERNAME
      secretName:  secretspass-credentials
      key: MONGO_INITDB_ROOT_USERNAME
    - name: MONGO_INITDB_ROOT_PASSWORD
      secretName:  secretspass-credentials
      key: MONGO_INITDB_ROOT_PASSWORD
    - name: DB_NAME
      secretName:  secretspass-credentials
      key: DB_NAME
    - name: FERNET_KEY
      secretName:  secretspass-credentials
      key: FERNET_KEY  
    - name: ADMIN_PASSWORD
      secretName:  secretspass-credentials
      key: ADMIN_PASSWORD
    - name: MICROSOFT_ENTRA_IDENTIFIER
      secretName:  secretspass-credentials
      key: MICROSOFT_ENTRA_IDENTIFIER
    - name: SAML_LOGIN_URL
      secretName:  secretspass-credentials
      key: SAML_LOGIN_URL
    - name: SAML_CERTIFICATE
      secretName:  secretspass-credentials
      key: SAML_CERTIFICATE
      
  provider:
    aws:
      enabled: true
      secretName: secretspass-credentials
      credentials:
        aws_access_key_id: AWS_ACCESS_KEY_ID
        aws_secret_access_key: AWS_SECRET_ACCESS_KEY
        bucket_name: BUCKET_NAME
    azure:
      enabled: false
      secretName: cronjob-credentials-azure
      credentials:
        azure_tenant_id: AZURE_TENANT_ID
        azure_client_id: AZURE_CLIENT_ID
        azure_client_secret: AZURE_CLIENT_SECRET
        azure_storage_account: AZURE_STORAGE_ACCOUNT
        azure_storage_container: AZURE_STORAGE_CONTAINER
    gcp:
      enabled: false 
      secretName: cronjob-credentials-gcp
      credentials:
        gcp_application_credentials: GCP_APPLICATION_CREDENTIALS
        gcp_bucket_name: GCP_BUCKET_NAME    

  cm:
    enabled: true
    data:
      MONGO_INITDB_HOST: db-service
      SAML_IDENTIFIER: https://secretpass.spider-shlomo.com/remote/saml/metadata
      SAML_REPLY_URL: https://secretpass.spider-shlomo.com/remote/saml/acs
      FRONTEND_URL_SAML: https://secretpass.spider-shlomo.com
      ALLOWED_AZURE_USERS_ID: 9270575a-12a3-48a7-b649-e747e284829d,b12a4d5c-00cc-48be-bb51-fae361a61be8
      ALLOWED_ORGANIZATIONS_ID: a2724ae3-73eb-4b45-ba62-f432da279e2c
      ALLOWED_EMAIL_DOMAINS: spider-shlomo.com
      ENABLE_AZURE_GROUPS: false
      ALLOWED_AZURE_GROUPS_ID: false
      ENABLE_AZURE_USERS: true
      aws: "true"
      azure: ""
      gcp: ""

  resources:    
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi    

  ingress:
    enabled: true  
    ingressClassName: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      kubernetes.io/preserve-host: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    host: secretpass.spider-shlomo.com
    paths:
    -  path: /api/
       pathType: Prefix
       serviceName: backend-svc
    -  path: /remote/saml/
       pathType: Prefix
       serviceName: backend-svc   

client:
  enabled: true
  revisionHistoryLimit: 0
#  replicas: 2
  name: frontend
  annotations:
    configmap.reloader.stakater.com/reload: "config-frontend"
    secret.reloader.stakater.com/reload: "secretspass-credentials"
  service:
    enabled: true
    serviceType: ClusterIP
    port: 3000
  image:
    name: shlomobarzili/secretpass-frontend
    pullPolicy: IfNotPresent
    tag: v3.1.0
  containerPort: 3000
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 70
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 50
            periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 50
            periodSeconds: 15
  affinity: {} 
  env: []
  cm:
    enabled: true
    data:
      REACT_APP_API_URL: https://secretpass.spider-shlomo.com
      REACT_APP_ENABLE_SAML: true
  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3   
  resources:
    requests:
      cpu: 250m
      memory: 1.5Gi
    limits:
      cpu: 1
      memory: 2Gi   
    
  ingress:
    enabled: true  
    ingressClassName: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      kubernetes.io/preserve-host: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    host: secretpass.spider-shlomo.com
    paths:
    -  path: /
       pathType: Prefix
       serviceName: frontend-svc
    tls:
      - secretName: secretpass-app-tls
        hosts:
          - secretpass.spider-shlomo.com

db:  
  enabled: true
  revisionHistoryLimit: 0
  replicas: 1
  name: db
  annotations:
    configmap.reloader.stakater.com/reload: "config-db"
    secret.reloader.stakater.com/reload: "secretspass-credentials"
  service:
    enabled: true
    serviceType: ClusterIP
    port: 27017
  replicas: 1
  image:
    name: mongo
    pullPolicy: IfNotPresent
    tag: latest
  containerPort: 27017
  affinity: {}
  env:
    - name: MONGO_INITDB_ROOT_USERNAME
      secretName:  secretspass-credentials
      key: MONGO_INITDB_ROOT_USERNAME
    - name: MONGO_INITDB_ROOT_PASSWORD
      secretName:  secretspass-credentials
      key: MONGO_INITDB_ROOT_PASSWORD
  cm:
    enabled: true
    data:
      MONGO_INITDB_ROOT_USERNAME: MONGO_INITDB_HOST

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi