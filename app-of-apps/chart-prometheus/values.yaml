serviceAccount:
  create: true  

server:
  global:
    scrape_interval: 15s
    scrape_timeout: 10s
    evaluation_interval: 15s

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      kubernetes.io/preserve-host: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - prometheus-k3s.spider-shlomo.com
    path: /
    pathType: Prefix    
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus-k3s.spider-shlomo.com

  service:
    enabled: true
    type: ClusterIP
    targetPort: 3000

  persistentVolume:
    enabled: true
    size: 10Gi

  # secrets for metrics, job-name secretpass
  extraSecretMounts:
    - name: secretpass-metrics-auth
      secretName: aws-secret-secretpass-metrics-auth
      mountPath: /etc/prometheus/secrets/secretpass-metrics-auth
      readOnly: true

    - name: kuma-uptime-metrics-auth
      secretName: kuma-uptime-metrics-auth
      mountPath: /etc/prometheus/secrets/kuma-uptime-metrics-auth
      readOnly: true  

serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: 'prometheus'
        metrics_path: '/metrics'
        static_configs:
          - targets: 
              - "prometheus-k3s.spider-shlomo.com:443"
        scheme: https

      - job_name: grafana
        metrics_path: /metrics
        static_configs:
          - targets:
              - "grafana-k3s.spider-shlomo.com:443"
        scheme: https      

      - job_name: "backend-secretpass"
        metrics_path: "/api/metrics"
        static_configs:
          - targets:
              - "secretpass.spider-shlomo.com:443"
        scheme: https

      - job_name: 'node-exporter-nodes'
        metrics_path: /metrics
        static_configs:
          - targets:
              - "master:9100"
              - "master2:9100"
              - "master3:9100"
              - "node2:9100"
              - "node4:9100"
              - "node5:9100"


      - job_name: 'pushgateway'
        metrics_path: /metrics
        static_configs:
          - targets:
              - "prometheus-prometheus-pushgateway:9091" 

      - job_name: 'uptime-kuma'
        metrics_path: /metrics
        basic_auth:
          username_file: /etc/prometheus/secrets/kuma-uptime-metrics-auth/username
          password_file: /etc/prometheus/secrets/kuma-uptime-metrics-auth/password
        static_configs:
          - targets:
              - "uptime-kuma:3001"        

      - job_name: "all-pods-/metrics"
        metrics_path: "/metrics"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: kubernetes_app

      - job_name: "secretpass-backend"
        metrics_path: "/api/metrics"
        basic_auth:
          username_file: /etc/prometheus/secrets/secretpass-metrics-auth/username
          password_file: /etc/prometheus/secrets/secretpass-metrics-auth/password
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - secretpass
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: backend
            action: keep
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: kubernetes_app
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1:5050

      - job_name: hubble-metrics
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - cilium-network-policy
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: hubble-metrics
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: hubble-metrics
            action: keep

      - job_name: kubernetes-cadvisor
        scheme: https
        metrics_path: /metrics/cadvisor
        authorization:
          type: Bearer
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

#---------------outside the network----------------#

      - job_name: "shlomo-pc"
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - "10.0.11.250:9100"

      - job_name: "lab-ubuntu-consumer-docker"
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - "10.0.11.10:8001" 

      - job_name: "cunstomer-k3s"
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - "10.90.100.126:8001"

      - job_name: "lab-ubuntu-node-exporter"
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - "10.0.11.10:9100"                              
  
alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    path: /
    pathType: Prefix
    annotations:
      kubernetes.io/ingress.class: traefik
      kubernetes.io/preserve-host: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts: 
      - pushgateway.spider-shlomo.com
    tls:
      - secretName: prometheus-pushgateway-tls
        hosts:
          - pushgateway.spider-shlomo.com
    


kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true
  service:
    type: ClusterIP
    port: 9100
    targetPort: 9100
    PortName: metrics
    name: node-exporter